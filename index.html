<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>환율 계산기 | 전세계 통화 변환</title>
  <meta name="description" content="준실시간 환율로 전세계 통화를 변환하는 환율 계산기. 모든 통화 지원." />
  <link rel="stylesheet" href="./css/style.css?v=2" />

  <!-- 애드센스 head 코드가 이미 있다면, 네 코드로 여기 유지/교체 -->
  <!--
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4640178123605595"
    crossorigin="anonymous"></script>
  -->
</head>
<body>
  <main class="wrap">
    <h1>환율 계산기</h1>

    <section class="card">
      <div class="row">
        <label for="amount">금액</label>
        <input id="amount" type="number" inputmode="decimal" step="0.01" placeholder="예: 10" />
      </div>

      <div class="grid">
        <div class="row">
          <label for="fromCurrency">변환 전 통화</label>
          <select id="fromCurrency"></select>
        </div>

        <div class="row">
          <label for="toCurrency">변환 후 통화</label>
          <select id="toCurrency"></select>
        </div>
      </div>

      <div class="actions">
        <button id="convertBtn" type="button">변환하기</button>
        <button id="swapBtn" type="button" class="ghost">통화 바꾸기</button>
        <button id="loadRatesBtn" type="button" class="ghost">환율 다시 불러오기</button>
      </div>

      <div class="hint" id="rateMeta"></div>
      <div class="result" id="result">환율을 불러오는 중입니다.</div>

      <!-- 애드센스 광고 블록이 이미 있다면, 네 코드로 여기 유지/교체 -->
      <!--
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4640178123605595"
           crossorigin="anonymous"></script>
      <!-- fx-calculator-top -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-4640178123605595"
           data-ad-slot="1089514795"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
      -->
    </section>

    <footer class="footer">
      <small>데이터 출처: open.er-api.com (준실시간)</small>
    </footer>
  </main>

  <script src="./js/app.js?v=2"></script>
</body>
</html>
